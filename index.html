<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>観光感情マップ | 和歌山</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2235;
    --surface: #1e2d45;
    --border: rgba(99,179,237,0.15);
    --accent: #63b3ed;
    --accent2: #48bb78;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --excited: #f6ad55;
    --calm: #68d391;
    --surprised: #f687b3;
    --relaxed: #76e4f7;
    --bored: #a0aec0;
    --font-jp: 'Noto Sans JP', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  body {
    font-family: var(--font-jp);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .logo span { color: var(--text2); }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .live-badge {
    font-size: 0.72rem;
    color: var(--accent2);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
  }

  /* ── layout ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    height: calc(100vh - 57px);
  }

  /* ── sidebar left ── */
  .sidebar-left {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.25rem;
  }
  .sidebar-title {
    font-size: 0.65rem;
    font-family: var(--font-mono);
    color: var(--text2);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  /* 感情凡例 */
  .emotion-legend { margin-bottom: 1.5rem; }
  .emotion-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.6rem 0.75rem;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .emotion-item:hover { background: var(--surface); }
  .emotion-item.active { background: var(--surface); border-color: var(--border); }
  .emotion-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .emotion-label { font-size: 0.88rem; font-weight: 500; }
  .emotion-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text2);
  }

  /* フィルター */
  .filter-section { margin-bottom: 1.5rem; }
  .filter-label {
    font-size: 0.65rem;
    font-family: var(--font-mono);
    color: var(--text2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  select, input[type="range"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 0.45rem 0.6rem;
    font-family: var(--font-jp);
    font-size: 0.82rem;
    margin-bottom: 0.5rem;
    appearance: none;
  }
  .range-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--text2);
    font-family: var(--font-mono);
    margin-top: -2px;
    margin-bottom: 0.75rem;
  }

  /* ── map area ── */
  .map-area {
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  #map-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* センサーデータパネル（上部） */
  .sensor-bar {
    position: absolute;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .sensor-chip {
    background: rgba(26,34,53,0.92);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 0.9rem;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(4px);
  }
  .chip-label { color: var(--text2); }
  .chip-value { color: var(--accent); font-weight: 700; }
  .chip-value.excited { color: var(--excited); }
  .chip-value.calm { color: var(--calm); }

  /* tooltip */
  .map-tooltip {
    position: absolute;
    background: rgba(17,24,39,0.96);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    pointer-events: none;
    z-index: 20;
    min-width: 180px;
    display: none;
    backdrop-filter: blur(8px);
  }
  .tooltip-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
  .tooltip-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
    color: var(--text2);
  }
  .tooltip-row span:last-child { color: var(--text); font-family: var(--font-mono); }

  /* 追加ボタン */
  .add-btn {
    position: absolute;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--accent);
    color: #0a0f1e;
    border: none;
    border-radius: 50%;
    width: 48px; height: 48px;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    transition: transform 0.15s, background 0.15s;
    z-index: 10;
  }
  .add-btn:hover { transform: scale(1.08); background: #90cdf4; }

  /* ── sidebar right ── */
  .sidebar-right {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* 統計カード */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }
  .stat-card-title {
    font-size: 0.65rem;
    font-family: var(--font-mono);
    color: var(--text2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .stat-big {
    font-family: var(--font-mono);
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-sub { font-size: 0.75rem; color: var(--text2); }

  /* ミニ棒グラフ */
  .bar-chart { margin-top: 0.5rem; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .bar-name { font-size: 0.75rem; color: var(--text2); width: 70px; flex-shrink: 0; }
  .bar-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .bar-pct { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text2); width: 32px; text-align: right; }

  /* 最新データフィード */
  .feed-item {
    display: flex;
    gap: 10px;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .feed-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .feed-loc { font-weight: 500; font-size: 0.82rem; }
  .feed-meta { color: var(--text2); font-size: 0.72rem; }
  .feed-time { margin-left: auto; font-family: var(--font-mono); font-size: 0.68rem; color: var(--text2); flex-shrink: 0; }

  /* データ投稿モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    width: 400px;
    max-width: 95vw;
  }
  .modal-title {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 0.35rem; }
  .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 0.55rem 0.75rem;
    font-family: var(--font-jp);
    font-size: 0.85rem;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .emotion-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 4px;
  }
  .emo-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.25rem;
    color: var(--text2);
    font-family: var(--font-jp);
    font-size: 0.78rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .emo-btn:hover { border-color: var(--accent); color: var(--text); }
  .emo-btn.selected { border-color: currentColor; background: rgba(99,179,237,0.08); }

  .modal-footer { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-submit {
    flex: 1;
    background: var(--accent);
    color: #0a0f1e;
    border: none;
    border-radius: 8px;
    padding: 0.65rem;
    font-family: var(--font-jp);
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-submit:hover { background: #90cdf4; }
  .btn-cancel {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-family: var(--font-jp);
    font-size: 0.85rem;
    cursor: pointer;
  }

  /* 波形アニメーション（センサービジュアル） */
  .waveform {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 24px;
  }
  .wave-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; background: var(--excited); }
  .wave-bar:nth-child(4) { animation-delay: 0.15s; }
  .wave-bar:nth-child(5) { animation-delay: 0.05s; background: var(--calm); }
  .wave-bar:nth-child(6) { animation-delay: 0.25s; }
  .wave-bar:nth-child(7) { animation-delay: 0.1s; }
  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 20px; }
  }

  scrollbar-width: thin;
  scrollbar-color: var(--surface) transparent;
</style>
</head>
<body>

<header>
  <div class="logo">Kanko<span>Sense</span> / 感情マップ</div>
  <div style="display:flex;align-items:center;gap:1.5rem;">
    <div class="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <div class="live-badge"><span class="status-dot"></span>LIVE DATA</div>
  </div>
</header>

<div class="layout">

  <!-- 左サイドバー -->
  <div class="sidebar-left">
    <div class="sidebar-title">感情フィルター</div>

    <div class="emotion-legend" id="emotion-legend">
      <!-- JSで生成 -->
    </div>

    <div class="filter-section">
      <div class="filter-label">対象期間</div>
      <select id="period-select">
        <option value="today">今日</option>
        <option value="week" selected>直近1週間</option>
        <option value="month">直近1ヶ月</option>
        <option value="all">全期間</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">覚醒度しきい値</div>
      <input type="range" id="arousal-filter" min="0" max="100" value="0">
      <div class="range-row">
        <span>低覚醒</span>
        <span id="arousal-val">0%</span>
        <span>高覚醒</span>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">観光エリア</div>
      <select id="area-select">
        <option value="all">全エリア</option>
        <option value="kumano">南紀熊野</option>
        <option value="koyasan">高野山</option>
        <option value="shirahama">白浜</option>
        <option value="kishikawa">紀ノ川</option>
      </select>
    </div>

    <div class="sidebar-title" style="margin-top:0.5rem;">センサー情報</div>
    <div class="stat-card" style="margin-bottom:0.5rem;">
      <div style="font-size:0.75rem;color:var(--text2);margin-bottom:4px;">心拍数 (BPM)</div>
      <div style="display:flex;align-items:baseline;gap:6px;">
        <span id="bpm-display" style="font-family:var(--font-mono);font-size:1.8rem;color:var(--excited);font-weight:700;">78</span>
        <span style="font-size:0.72rem;color:var(--text2);">bpm</span>
      </div>
    </div>
    <div class="stat-card">
      <div style="font-size:0.75rem;color:var(--text2);margin-bottom:4px;">EDA (μS)</div>
      <div style="display:flex;align-items:baseline;gap:6px;">
        <span id="eda-display" style="font-family:var(--font-mono);font-size:1.8rem;color:var(--relaxed);font-weight:700;">2.4</span>
        <span style="font-size:0.72rem;color:var(--text2);">μS</span>
      </div>
    </div>
  </div>

  <!-- マップエリア -->
  <div class="map-area">
    <!-- センサーバー -->
    <div class="sensor-bar">
      <div class="sensor-chip">
        <span class="chip-label">HR</span>
        <span class="chip-value excited" id="chip-hr">78 bpm</span>
      </div>
      <div class="sensor-chip">
        <span class="chip-label">EDA</span>
        <span class="chip-value calm" id="chip-eda">2.4 μS</span>
      </div>
      <div class="sensor-chip">
        <span class="chip-label">感情</span>
        <span class="chip-value" id="chip-emo" style="color:var(--excited);">興奮</span>
      </div>
      <div class="sensor-chip">
        <span class="chip-label">被験者</span>
        <span class="chip-value">12名</span>
      </div>
    </div>

    <canvas id="map-canvas"></canvas>

    <div class="map-tooltip" id="tooltip">
      <div class="tooltip-name" id="tt-name"></div>
      <div class="tooltip-row"><span>主感情</span><span id="tt-emo"></span></div>
      <div class="tooltip-row"><span>平均心拍</span><span id="tt-hr"></span></div>
      <div class="tooltip-row"><span>平均EDA</span><span id="tt-eda"></span></div>
      <div class="tooltip-row"><span>測定回数</span><span id="tt-count"></span></div>
      <div class="tooltip-row"><span>覚醒度</span><span id="tt-arousal"></span></div>
    </div>

    <button class="add-btn" id="add-btn" title="データを追加">+</button>
  </div>

  <!-- 右サイドバー -->
  <div class="sidebar-right">
    <div class="sidebar-title">統計ダッシュボード</div>

    <div class="stat-card">
      <div class="stat-card-title">総測定数</div>
      <div class="stat-big" id="total-count">247</div>
      <div class="stat-sub">件のデータポイント</div>
    </div>

    <div class="stat-card">
      <div class="stat-card-title">感情分布</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>

    <div class="stat-card">
      <div class="stat-card-title">最も「興奮」した場所</div>
      <div style="font-size:0.9rem;font-weight:500;margin-bottom:2px;" id="top-excited-place">橋杭岩</div>
      <div style="font-family:var(--font-mono);font-size:0.75rem;color:var(--excited);">覚醒度 87%</div>
    </div>

    <div class="stat-card">
      <div class="stat-card-title">リアルタイムフィード</div>
      <div id="live-feed"></div>
    </div>
  </div>
</div>

<!-- データ追加モーダル -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">センサーデータを記録</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">観光地名</label>
        <input class="form-input" id="f-place" placeholder="例: 橋杭岩">
      </div>
      <div class="form-group">
        <label class="form-label">エリア</label>
        <select class="form-input" id="f-area">
          <option value="kumano">南紀熊野</option>
          <option value="koyasan">高野山</option>
          <option value="shirahama">白浜</option>
          <option value="kishikawa">紀ノ川</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">心拍数 (bpm)</label>
        <input class="form-input" id="f-hr" type="number" placeholder="75" min="40" max="200">
      </div>
      <div class="form-group">
        <label class="form-label">EDA (μS)</label>
        <input class="form-input" id="f-eda" type="number" placeholder="2.5" min="0" max="30" step="0.1">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">推定感情（自動推定または手動選択）</label>
      <div class="emotion-selector" id="emo-selector"></div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <input class="form-input" id="f-note" placeholder="観光地の印象など">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">キャンセル</button>
      <button class="btn-submit" id="modal-submit">記録する</button>
    </div>
  </div>
</div>

<script>
const EMOTIONS = [
  { id: 'excited',   label: '興奮',   color: '#f6ad55', emoji: '⚡' },
  { id: 'surprised', label: '驚き',   color: '#f687b3', emoji: '✨' },
  { id: 'relaxed',   label: 'リラックス', color: '#76e4f7', emoji: '🌊' },
  { id: 'calm',      label: '穏やか', color: '#68d391', emoji: '🍃' },
  { id: 'moved',     label: '感動',   color: '#b794f4', emoji: '💫' },
  { id: 'bored',     label: '平静',   color: '#a0aec0', emoji: '○' },
];

// 観光地マップデータ（和歌山の実際の相対位置を模倣）
const SPOTS = [
  { id: 1, name: '橋杭岩',    x: 0.72, y: 0.68, area: 'kumano',   dominant: 'surprised', hr: 92, eda: 5.2, count: 34, arousal: 87 },
  { id: 2, name: '熊野那智大社', x: 0.78, y: 0.82, area: 'kumano',   dominant: 'moved',    hr: 80, eda: 3.8, count: 28, arousal: 72 },
  { id: 3, name: '那智の滝',  x: 0.80, y: 0.85, area: 'kumano',   dominant: 'excited',  hr: 88, eda: 4.7, count: 41, arousal: 83 },
  { id: 4, name: '熊野速玉大社', x: 0.68, y: 0.75, area: 'kumano',   dominant: 'calm',     hr: 72, eda: 2.1, count: 19, arousal: 45 },
  { id: 5, name: '高野山',    x: 0.28, y: 0.22, area: 'koyasan',  dominant: 'moved',    hr: 75, eda: 3.2, count: 52, arousal: 68 },
  { id: 6, name: '壇上伽藍',  x: 0.25, y: 0.20, area: 'koyasan',  dominant: 'calm',     hr: 68, eda: 1.8, count: 23, arousal: 38 },
  { id: 7, name: '三段壁',    x: 0.35, y: 0.58, area: 'shirahama', dominant: 'excited',  hr: 95, eda: 6.1, count: 38, arousal: 92 },
  { id: 8, name: '千畳敷',    x: 0.32, y: 0.56, area: 'shirahama', dominant: 'relaxed',  hr: 70, eda: 2.0, count: 29, arousal: 42 },
  { id: 9, name: '白浜温泉',  x: 0.30, y: 0.60, area: 'shirahama', dominant: 'relaxed',  hr: 66, eda: 1.4, count: 45, arousal: 35 },
  { id: 10, name: '粉河寺',   x: 0.22, y: 0.38, area: 'kishikawa', dominant: 'calm',     hr: 71, eda: 1.9, count: 17, arousal: 41 },
  { id: 11, name: '吉野（奥千本）', x: 0.12, y: 0.15, area: 'kumano', dominant: 'moved',  hr: 82, eda: 3.5, count: 31, arousal: 74 },
  { id: 12, name: '潮岬',     x: 0.65, y: 0.92, area: 'kumano',   dominant: 'surprised', hr: 86, eda: 4.4, count: 22, arousal: 79 },
];

let activeEmotions = new Set(EMOTIONS.map(e => e.id));
let selectedEmo = null;

function getEmo(id) { return EMOTIONS.find(e => e.id === id); }

// ── 感情凡例を生成 ──
function buildLegend() {
  const container = document.getElementById('emotion-legend');
  const counts = {};
  EMOTIONS.forEach(e => counts[e.id] = 0);
  SPOTS.forEach(s => counts[s.dominant]++);

  container.innerHTML = EMOTIONS.map(e => `
    <div class="emotion-item active" data-emo="${e.id}" onclick="toggleEmotion('${e.id}')">
      <div class="emotion-dot" style="background:${e.color}"></div>
      <span class="emotion-label" style="color:${e.color}">${e.label}</span>
      <span class="emotion-count">${counts[e.id]}</span>
    </div>
  `).join('');
}

function toggleEmotion(id) {
  if (activeEmotions.has(id)) activeEmotions.delete(id);
  else activeEmotions.add(id);
  document.querySelectorAll(`[data-emo="${id}"]`).forEach(el => el.classList.toggle('active'));
  drawMap();
}

// ── 棒グラフ ──
function buildBarChart() {
  const container = document.getElementById('bar-chart');
  const total = SPOTS.length;
  const counts = {};
  EMOTIONS.forEach(e => counts[e.id] = 0);
  SPOTS.forEach(s => counts[s.dominant]++);

  container.innerHTML = EMOTIONS.map(e => {
    const pct = Math.round(counts[e.id] / total * 100);
    return `
      <div class="bar-row">
        <span class="bar-name">${e.label}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${e.color}"></div></div>
        <span class="bar-pct">${pct}%</span>
      </div>
    `;
  }).join('');
}

// ── Canvas マップ ──
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  drawMap();
}

function drawMap() {
  ctx.clearRect(0, 0, W, H);

  // 背景グリッド
  ctx.strokeStyle = 'rgba(99,179,237,0.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // 和歌山の輪郭（簡略ポリゴン）
  ctx.beginPath();
  const outline = [
    [0.05,0.05],[0.45,0.02],[0.60,0.05],[0.55,0.30],[0.45,0.45],
    [0.50,0.60],[0.40,0.72],[0.55,0.80],[0.65,0.95],[0.85,0.98],
    [0.90,0.90],[0.75,0.70],[0.82,0.55],[0.70,0.40],[0.75,0.20],
    [0.65,0.08],[0.50,0.04]
  ];
  ctx.moveTo(outline[0][0]*W, outline[0][1]*H);
  outline.forEach(([x,y]) => ctx.lineTo(x*W, y*H));
  ctx.closePath();
  ctx.fillStyle = 'rgba(30,45,69,0.55)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(99,179,237,0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 地名ラベル（エリア）
  ctx.fillStyle = 'rgba(99,179,237,0.25)';
  ctx.font = '500 11px "Space Mono"';
  ctx.fillText('KOYASAN', 0.18*W, 0.28*H);
  ctx.fillText('SHIRAHAMA', 0.14*W, 0.66*H);
  ctx.fillText('KUMANO', 0.60*W, 0.60*H);

  // ヒートマップ風の光彩
  const arousalFilter = parseInt(document.getElementById('arousal-filter').value);
  SPOTS.filter(s => activeEmotions.has(s.dominant) && s.arousal >= arousalFilter).forEach(s => {
    const emo = getEmo(s.dominant);
    const px = s.x * W, py = s.y * H;
    const r = 40 + s.count * 0.6;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, r);
    grad.addColorStop(0, emo.color + '44');
    grad.addColorStop(1, emo.color + '00');
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // スポットマーカー
  const arousalF = parseInt(document.getElementById('arousal-filter').value);
  SPOTS.filter(s => activeEmotions.has(s.dominant) && s.arousal >= arousalF).forEach(s => {
    const emo = getEmo(s.dominant);
    const px = s.x * W, py = s.y * H;
    const size = 8 + s.count * 0.12;

    // 外輪
    ctx.beginPath();
    ctx.arc(px, py, size + 3, 0, Math.PI * 2);
    ctx.strokeStyle = emo.color + '55';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 本体
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fillStyle = emo.color + 'cc';
    ctx.fill();
    ctx.strokeStyle = emo.color;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ラベル
    ctx.fillStyle = '#e2e8f0';
    ctx.font = '500 11px "Noto Sans JP"';
    ctx.textAlign = 'center';
    ctx.fillText(s.name, px, py + size + 14);
    ctx.textAlign = 'left';
  });
}

// ── Tooltip ──
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const arousalF = parseInt(document.getElementById('arousal-filter').value);

  const hit = SPOTS.find(s => {
    if (!activeEmotions.has(s.dominant) || s.arousal < arousalF) return false;
    const dx = s.x * W - mx, dy = s.y * H - my;
    return Math.sqrt(dx*dx + dy*dy) < 20;
  });

  const tooltip = document.getElementById('tooltip');
  if (hit) {
    const emo = getEmo(hit.dominant);
    document.getElementById('tt-name').textContent = hit.name;
    document.getElementById('tt-name').style.color = emo.color;
    document.getElementById('tt-emo').textContent = emo.emoji + ' ' + emo.label;
    document.getElementById('tt-hr').textContent = hit.hr + ' bpm';
    document.getElementById('tt-eda').textContent = hit.eda + ' μS';
    document.getElementById('tt-count').textContent = hit.count + ' 回';
    document.getElementById('tt-arousal').textContent = hit.arousal + '%';
    tooltip.style.display = 'block';
    let tx = e.clientX - rect.left + 16;
    let ty = e.clientY - rect.top - 20;
    if (tx + 200 > W) tx -= 220;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  }
});
canvas.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });

// ── フィルター ──
document.getElementById('arousal-filter').addEventListener('input', function() {
  document.getElementById('arousal-val').textContent = this.value + '%';
  drawMap();
});

// ── ライブセンサーシミュレーション ──
let bpm = 78, eda = 2.4;
function simulateSensor() {
  bpm = Math.max(55, Math.min(130, bpm + (Math.random() - 0.5) * 6));
  eda = Math.max(0.5, Math.min(10, eda + (Math.random() - 0.5) * 0.4));
  document.getElementById('bpm-display').textContent = Math.round(bpm);
  document.getElementById('eda-display').textContent = eda.toFixed(1);
  document.getElementById('chip-hr').textContent = Math.round(bpm) + ' bpm';
  document.getElementById('chip-eda').textContent = eda.toFixed(1) + ' μS';
  const arousal = Math.min(100, Math.round((bpm - 55) / 75 * 70 + eda / 10 * 30));
  let emo = 'calm';
  if (bpm > 100 && eda > 4) emo = 'excited';
  else if (bpm > 90 && eda > 3) emo = 'surprised';
  else if (bpm < 70 && eda < 2) emo = 'relaxed';
  else if (bpm < 75) emo = 'calm';
  const emoObj = getEmo(emo);
  document.getElementById('chip-emo').textContent = emoObj.label;
  document.getElementById('chip-emo').style.color = emoObj.color;
}
setInterval(simulateSensor, 1800);

// ── ライブフィード ──
const feedData = [
  { place: '那智の滝', emo: 'excited', hr: 91, time: '2分前' },
  { place: '高野山', emo: 'moved', hr: 78, time: '5分前' },
  { place: '白浜温泉', emo: 'relaxed', hr: 65, time: '8分前' },
  { place: '橋杭岩', emo: 'surprised', hr: 88, time: '12分前' },
  { place: '三段壁', emo: 'excited', hr: 97, time: '15分前' },
];
function buildFeed(data) {
  const container = document.getElementById('live-feed');
  container.innerHTML = data.map(f => {
    const emo = getEmo(f.emo);
    return `
      <div class="feed-item">
        <div class="feed-dot" style="background:${emo.color}"></div>
        <div>
          <div class="feed-loc">${f.place}</div>
          <div class="feed-meta">${emo.label} · ${f.hr} bpm</div>
        </div>
        <span class="feed-time">${f.time}</span>
      </div>
    `;
  }).join('');
}
buildFeed(feedData);

// 定期的に新しいデータを追加
const newRecords = [
  { place: '熊野那智大社', emo: 'moved', hr: 82 },
  { place: '千畳敷', emo: 'relaxed', hr: 68 },
  { place: '吉野（奥千本）', emo: 'moved', hr: 84 },
];
let feedIdx = 0;
setInterval(() => {
  const rec = newRecords[feedIdx % newRecords.length];
  feedIdx++;
  feedData.unshift({ ...rec, time: 'たった今' });
  if (feedData.length > 6) feedData.pop();
  else feedData.forEach((f, i) => {
    if (i > 0) f.time = (i * 3) + '分前';
  });
  buildFeed(feedData);
  document.getElementById('total-count').textContent = (247 + feedIdx);
}, 5000);

// ── モーダル ──
function buildEmoSelector() {
  document.getElementById('emo-selector').innerHTML = EMOTIONS.map(e => `
    <button class="emo-btn" data-eid="${e.id}" onclick="selectEmo('${e.id}')" style="color:${e.color}">
      ${e.emoji} ${e.label}
    </button>
  `).join('');
}
function selectEmo(id) {
  selectedEmo = id;
  document.querySelectorAll('.emo-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.emo-btn[data-eid="${id}"]`).classList.add('selected');

  // HR/EDA入力値から感情を自動推定
  const hr = parseFloat(document.getElementById('f-hr').value);
  const eda = parseFloat(document.getElementById('f-eda').value);
  if (hr && eda) {
    let autoEmo = 'calm';
    if (hr > 100 && eda > 4) autoEmo = 'excited';
    else if (hr > 90) autoEmo = 'surprised';
    else if (hr < 70 && eda < 2) autoEmo = 'relaxed';
    document.getElementById('f-hr').style.borderColor = id === autoEmo ? 'var(--calm)' : 'var(--border)';
  }
}

document.getElementById('add-btn').onclick = () => {
  document.getElementById('modal').classList.add('open');
  buildEmoSelector();
};
document.getElementById('modal-cancel').onclick = () => document.getElementById('modal').classList.remove('open');

document.getElementById('modal-submit').onclick = () => {
  const place = document.getElementById('f-place').value.trim();
  const hr = parseFloat(document.getElementById('f-hr').value);
  const eda = parseFloat(document.getElementById('f-eda').value);
  if (!place || !hr || !eda || !selectedEmo) {
    alert('観光地名・心拍数・EDA・感情をすべて入力してください');
    return;
  }

  // フィードに追加
  feedData.unshift({ place, emo: selectedEmo, hr: Math.round(hr), time: 'たった今' });
  if (feedData.length > 6) feedData.pop();
  buildFeed(feedData);
  document.getElementById('total-count').textContent = parseInt(document.getElementById('total-count').textContent) + 1;

  document.getElementById('modal').classList.remove('open');
  document.getElementById('f-place').value = '';
  document.getElementById('f-hr').value = '';
  document.getElementById('f-eda').value = '';
  document.getElementById('f-note').value = '';
  selectedEmo = null;
};

// モーダル外クリックで閉じる
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
});

// ── 初期化 ──
buildLegend();
buildBarChart();
new ResizeObserver(resize).observe(canvas);
resize();
</script>
